substitutions:
  name: "atom-echo-assistant"
  friendly_name: "Atom Echo"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  # Immediate hardware test on boot
  on_boot:
    priority: -10
    then:
      - light.turn_on:
          id: atom_led
          brightness: 50%
          red: 0%
          green: 100%
          blue: 0%
      - delay: 1s
      - light.turn_off: atom_led
      # Start local wake word detection automatically
      - micro_wake_word.start:

esp32:
  board: m5stack-atom
  cpu_frequency: 240MHz # <--- ADDED (Maximum power for AI)
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret echo_api_key

# Add OTA section with secret password reference
ota:
  - platform: esphome
    password: !secret echo_ota_password

wifi:
  ssid: !secret ha
  password: !secret hapswd
  # Corrected indentation for manual_ip:
  manual_ip:
    static_ip: 192.168.0.245
    gateway: 192.168.0.1
    subnet: 255.255.255.0

#web_server:
# port: 80

# Include modular components
packages:
  audio_config: !include my_echo/audio.yaml
  leds_config: !include my_echo/leds.yaml
  voice_config: !include my_echo/voice.yaml
