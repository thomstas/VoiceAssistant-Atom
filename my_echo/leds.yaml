# LED visual feedback configuration using ESP-IDF native driver
light:
  - platform: esp32_rmt_led_strip
    chipset: SK6812
    pin: GPIO27
    num_leds: 1
    rgb_order: GRB
    name: "Led Ring"
    id: led_ring
    effects:
      - pulse:
          name: "Pulse"
          transition_length: 250ms
          update_interval: 250ms