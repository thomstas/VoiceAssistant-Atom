micro_wake_word:
  models:
    - model: alexa

voice_assistant:
  id: va
  microphone: echo_mic
  media_player: echo_media_player
  use_wake_word: true
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  # Visual feedback for assistant states
  on_listening:
    - light.turn_on:
        id: atom_led
        blue: 100%
        brightness: 100%
  on_end:
    - light.turn_off: atom_led
  on_error:
    - light.turn_on:
        id: atom_led
        red: 100%
    - delay: 1s
    - light.turn_off: atom_led

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
    name: "Atom Button"
    on_press:
      - if:
          condition:
            voice_assistant.is_running:
          then:
            - voice_assistant.stop:
          else:
            - voice_assistant.start:
