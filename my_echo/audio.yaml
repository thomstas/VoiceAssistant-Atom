i2s_audio:
  - id: i2s_in
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO19
  - id: i2s_out
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO19

microphone:
  - platform: i2s_audio
    id: echo_mic
    adc_type: external
    i2s_audio_id: i2s_in
    i2s_din_pin: GPIO23
    pdm: true
    sample_rate: 16000
    correct_dc_offset: true 

speaker:
  - platform: i2s_audio
    id: echo_speaker
    i2s_audio_id: i2s_out
    i2s_dout_pin: GPIO22
    dac_type: external
    channel: mono

media_player:
  - platform: speaker
    id: echo_media_player
    name: "Atom Speaker"
    announcement_pipeline:
      speaker: echo_speaker
    # Usunięto codec_support_enabled: false (odtwarzacz obsłuży FLAC!)
    buffer_size: 8192 # Kompromis między stabilnością a pamięcią

number:
  - platform: template
    name: "Assistant Volume"
    id: assistant_volume
    min_value: 0
    max_value: 1
    step: 0.1
    initial_value: 0.8
    optimistic: true
    set_action:
      - media_player.volume_set:
          id: echo_media_player
          volume: !lambda "return x;"
