i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO19

microphone:
  - platform: i2s_audio
    id: echo_mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO23
    adc_type: external
    pdm: true
    sample_rate: 16000      # <--- ADDED
    correct_dc_offset: true # <--- ADDED (THIS RETURN AI HEARING!)

speaker:
  - platform: i2s_audio
    id: echo_speaker
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO22
    dac_type: external
    channel: mono

# Media player for audible responses
media_player:
  - platform: speaker
    id: echo_media_player
    name: "Atom Speaker"
    buffer_size: 16384
    announcement_pipeline:
      speaker: echo_speaker
    
# This creates the missing volume slider in Home Assistant
number:
  - platform: template
    name: "Assistant Volume"
    id: assistant_volume
    min_value: 0
    max_value: 1
    step: 0.1
    initial_value: 0.8
    optimistic: true
    set_action:
      - media_player.volume_set:
          id: echo_media_player
          volume: !lambda "return x;"
