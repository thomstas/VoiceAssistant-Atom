# Voice assistant and wake word pipeline logic
micro_wake_word:
  models:
    - ${micro_wake_word_model}

voice_assistant:
  id: va
  microphone: echo_microphone
  # Removed the direct 'speaker' definition to avoid exclusion conflict.
  # The assistant will route audio through the media_player instead.
  media_player: echo_media_player
  use_wake_word: true
  
  # Triggered when wake word is detected and listening starts
  on_listening:
    - light.turn_on:
        id: led_ring
        blue: 100%
        red: 0%
        green: 0%
        brightness: 100%
        effect: "Pulse"
        
  # Triggered when the assistant is replying
  on_tts_start:
    - light.turn_on:
        id: led_ring
        blue: 0%
        red: 0%
        green: 100%
        brightness: 100%
        effect: "Pulse"
        
  # Triggered when the interaction is finished successfully
  on_end:
    - light.turn_off: led_ring
    
  # Triggered if Home Assistant connection drops or command fails
  on_error:
    - light.turn_on:
        id: led_ring
        blue: 0%
        red: 100%
        green: 0%
        brightness: 100%
        effect: "None"
    - delay: 1s
    - light.turn_off: led_ring