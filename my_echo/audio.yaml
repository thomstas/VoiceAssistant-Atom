# Shared I2S bus for both Mic and Speaker
i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO19

# PDM Microphone (No channel setting here!)
microphone:
  - platform: i2s_audio
    id: echo_mic
    i2s_audio_id: i2s_bus
    i2s_din_pin: GPIO23
    adc_type: external
    pdm: true
    sample_rate: 16000
    correct_dc_offset: true

# Speaker
speaker:
  - platform: i2s_audio
    id: echo_speaker
    i2s_audio_id: i2s_bus
    i2s_dout_pin: GPIO22
    dac_type: external
    bits_per_sample: 16bit
    sample_rate: 16000
    channel: stereo  # <--- ZMIANA Z MONO NA STEREO! To ożywi mikrofon.

media_player:
  - platform: speaker
    id: echo_media_player
    name: "Atom Speaker"
    announcement_pipeline:
      speaker: echo_speaker
      format: WAV # <--- Zmusza HA do wysyłania lekkich plików
    codec_support_enabled: false # <--- Oszczędza RAM
    buffer_size: 6000 # <--- Zgodnie z oficjalnym plikiem
    codec_support_enabled: true
